name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
      
      - name: install deps
        run: sudo apt-get update && sudo apt-get install -y black uncrustify yapf buildifier

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Fail if `go mod tidy` changes anything
        run: go mod tidy --diff
